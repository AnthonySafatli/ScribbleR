services:
  db:
    image: postgres:15.5
    container_name: db
    env_file:
      - db.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scribbler-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ./ScribbleR.Server
    container_name: api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    expose:
      - "8080"
    depends_on:
      - db
    networks:
      - scribbler-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  client:
    build:
      context: ./scribbler.client
    container_name: client
    ports:
      - "3001:80"
    depends_on:
      - api
    networks:
      - scribbler-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:

networks:
  scribbler-net:
